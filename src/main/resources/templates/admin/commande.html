<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="sidebar">

    <div layout:fragment="contentForView" class="rightSide">
        <div class="rightContent">
            <div class="items" >
                <h1>Toutes les commandes</h1>
                <div th:each="c:${commandes}" class="commande">
                    <p th:text="'Date : '+${c.date}"> 09/03/2005</p>
                    <p th:text="'Adresse : '+${c.adresse}">Adresse : Sicap Baobab</p>
                    <p th:text="'Statut : '+${c.etatCommande}">Statut : Facturer</p>
                    <p>
                        <strong>
                            Articles
                        </strong>
                    </p>
                    <div class="ligne" th:each="l:${c.ligneCommandes}">
                        <p th:text="${l}" >1x Clim de ous 20000</p>
                    </div>
                    <p th:text="'Montant total : '+${c.montant}+' FCFA'">Montant total : 650.000</p>
                    <p th:text="'Mode de paiement : '+${c.modePaiement}">Mode de paiement : 0range Money</p>
                    <div class="buttons">
                        <a th:href="@{/admin/commandes/validate/{id}(id = ${c.id})}">
                            <button th:if="${c.etatCommande!='Terminer'}" class="green">
                                Marquer comme effectuée
                            </button>
                        </a>
                        <a th:href="@{/admin/commandes/delete/{id}(id = ${c.id})}">
                            <button class="red">
                                Supprimer
                            </button>
                        </a>
                    </div>
                </div>
            </div>
            <style>
                .buttons{
                    display: flex;
                    gap: 10px;
                }
                .commande{
                    display: flex;
                    flex-direction: column;
                    border: solid 1px #D9D9D9;
                    background-color: #FFFFFF;
                    width: 90%;
                    margin-bottom: 10px;
                    padding: 15px 0 15px 15px;
                }
                strong{
                    font-style: italic;
                }
                .ligne{
                    margin-left: 20px;
                }
                .red{
                    background-color: red;
                }
                .green{
                    background-color: lawngreen;
                }
                .orange{
                    background-color: darkorange;
                }
                button{
                    font-size: 1rem;
                    color: white;
                    padding: 7.5px 15px;
                    border-radius: 10px;
                    border: none;
                }
                .disabled:hover{
                    cursor: not-allowed;
                }
            </style>
        </div>
    </div>
</html>
